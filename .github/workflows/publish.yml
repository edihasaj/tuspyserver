name: Publish to PyPI

on:
  push:
    branches:
      - production

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Build package
      run: uv build --package tuspyserver

    - name: Publish to PyPI
      run: uv publish
