name: Publish to PyPI

on:
  push:
    branches:
      - main

concurrency:
  group: publish-pypi
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2

    - name: Compute next version
      id: version
      run: |
        NEXT=$(python3 - <<'PY'
        import json, tomllib, urllib.error, urllib.request

        PKG = "tuspyserver"

        with open("pyproject.toml", "rb") as f:
            current = tomllib.load(f)["project"]["version"]

        def parse(v):
            return tuple(int(p) for p in v.split("."))

        def exists(version):
            # Per-version endpoint is fresher than the aggregated `info.version`,
            # so it reliably reflects a just-published release.
            url = f"https://pypi.org/pypi/{PKG}/{version}/json"
            try:
                urllib.request.urlopen(url, timeout=15).read()
                return True
            except urllib.error.HTTPError as e:
                if e.code == 404:
                    return False
                raise
            except Exception:
                # On a transient error, assume it exists and skip past it —
                # a version gap is harmless, a duplicate upload is a hard failure.
                return True

        # Aggregated latest is a best-effort starting floor (may lag).
        try:
            with urllib.request.urlopen(
                f"https://pypi.org/pypi/{PKG}/json", timeout=15
            ) as r:
                latest = json.load(r)["info"]["version"]
        except Exception:
            latest = "0.0.0"

        # Floor is the higher of the manual pyproject version and PyPI's latest,
        # so a manual minor/major bump wins; then walk up to the first free patch.
        major, minor, patch = max(parse(current), parse(latest))
        while exists(f"{major}.{minor}.{patch}"):
            patch += 1

        print(f"{major}.{minor}.{patch}")
        PY
        )
        echo "next=$NEXT" >> "$GITHUB_OUTPUT"
        echo "Publishing version $NEXT"

    - name: Set version
      run: uv version --no-sync "${{ steps.version.outputs.next }}"

    - name: Build package
      run: uv build --package tuspyserver

    - name: Publish to PyPI
      env:
        UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      run: uv publish
